<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DinPlan - Chat</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "secondary-fixed-dim": "#71717a",
                "on-surface-variant": "#a1a1aa",
                "surface": "#0c0c0f",
                "on-primary-container": "#ede9fe",
                "primary-fixed": "#ede9fe",
                "error-container": "#3b1111",
                "surface-container-low": "#0f0f12",
                "on-secondary-container": "#a1a1aa",
                "surface-container": "#121215",
                "surface-variant": "#18181b",
                "inverse-surface": "#fafafa",
                "on-primary-fixed": "#2e1065",
                "primary-container": "#7c3aed",
                "on-background": "#fafafa",
                "on-secondary-fixed": "#18181b",
                "on-tertiary-container": "#bbf7d0",
                "surface-container-high": "#18181b",
                "on-primary-fixed-variant": "#5b21b6",
                "surface-dim": "#0c0c0f",
                "tertiary": "#34d399",
                "on-tertiary": "#001a12",
                "on-primary": "#0a0012",
                "surface-bright": "#18181b",
                "on-tertiary-fixed-variant": "#047857",
                "on-error": "#1a0000",
                "on-secondary-fixed-variant": "#3f3f46",
                "secondary-container": "#27272a",
                "surface-container-highest": "#1e1e22",
                "outline": "#52525b",
                "inverse-primary": "#5b21b6",
                "background": "#09090b",
                "secondary": "#71717a",
                "tertiary-fixed-dim": "#6ee7b7",
                "on-secondary": "#09090b",
                "tertiary-container": "#065f46",
                "tertiary-fixed": "#bbf7d0",
                "on-error-container": "#fca5a5",
                "error": "#ef4444",
                "primary-fixed-dim": "#c4b5fd",
                "primary": "#a78bfa",
                "surface-container-lowest": "#09090b",
                "secondary-fixed": "#a1a1aa",
                "on-tertiary-fixed": "#003318",
                "inverse-on-surface": "#09090b",
                "surface-tint": "#a78bfa",
                "outline-variant": "#27272a",
                "on-surface": "#fafafa"
        },
        "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
        },
        "spacing": {
                "container-margin": "20px",
                "inline-gap": "8px",
                "section-gap": "32px",
                "card-padding": "16px",
                "stack-gap": "12px"
        },
        "fontFamily": {
                "headline": [
                        "Geist"
                ],
                "display": [
                        "Geist"
                ],
                "body": [
                        "Geist"
                ],
                "label": [
                        "Geist"
                ]
        },
        "fontSize": {
                "body-md": [
                        "16px",
                        {
                                "lineHeight": "24px",
                                "fontWeight": "400"
                        }
                ],
                "headline-lg-mobile": [
                        "24px",
                        {
                                "lineHeight": "32px",
                                "fontWeight": "700"
                        }
                ],
                "headline-lg": [
                        "28px",
                        {
                                "lineHeight": "36px",
                                "letterSpacing": "-0.02em",
                                "fontWeight": "700"
                        }
                ],
                "label-sm": [
                        "12px",
                        {
                                "lineHeight": "16px",
                                "fontWeight": "500"
                        }
                ],
                "label-md": [
                        "14px",
                        {
                                "lineHeight": "20px",
                                "letterSpacing": "0.01em",
                                "fontWeight": "600"
                        }
                ],
                "body-lg": [
                        "18px",
                        {
                                "lineHeight": "26px",
                                "fontWeight": "400"
                        }
                ],
                "headline-md": [
                        "22px",
                        {
                                "lineHeight": "28px",
                                "fontWeight": "600"
                        }
                ]
        }
},
    },
  }
</script>
<style>
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body text-body-md text-on-surface bg-surface antialiased min-h-screen flex flex-col relative pb-32">
<!-- TopAppBar -->
<header class="bg-surface w-full top-0 sticky flex items-center justify-between px-container-margin h-16 z-40 border-b border-outline-variant/30">
<div class="flex items-center gap-4">
<button class="transition-transform active:scale-95 text-primary hover:bg-surface-variant rounded-full p-2 -ml-2 flex items-center justify-center">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-headline text-headline-md text-primary font-bold">DinPlan 🌼</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-variant flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">person</span>
</div>
</header>
<!-- Main Chat Canvas -->
<main class="flex-1 px-container-margin py-section-gap flex flex-col gap-stack-gap overflow-y-auto">
<!-- Chat Date Header -->
<div class="text-center text-label-sm font-label text-secondary mb-4">Today, 9:00 AM</div>
<!-- AI Bubble -->
<div class="self-start max-w-[85%]">
<div class="bg-surface-container text-on-surface px-card-padding py-3 rounded-lg border border-outline-variant/30">
                Namaste! Aaj ka kya plan hai?
            </div>
<div class="text-label-sm font-label text-secondary mt-1 ml-2">DinPlan Assistant</div>
</div>
<!-- User Bubble -->
<div class="self-end max-w-[85%] mt-section-gap">
<div class="bg-secondary-container text-on-surface px-card-padding py-3 rounded-lg border border-outline-variant/30">
                Gym jaana hai aur office ka kaam finish karna hai.
            </div>
<div class="text-label-sm font-label text-secondary mt-1 mr-2 text-right">You</div>
</div>
<!-- Typing Indicator -->
<div class="self-start max-w-[85%] mt-4">
<div class="bg-surface-container text-on-surface px-4 py-4 rounded-lg border border-outline-variant/30 flex gap-1 items-center h-[48px]">
<div class="w-2 h-2 bg-secondary rounded-full typing-dot"></div>
<div class="w-2 h-2 bg-secondary rounded-full typing-dot"></div>
<div class="w-2 h-2 bg-secondary rounded-full typing-dot"></div>
</div>
</div>
</main>
<!-- Bottom Input Area (Sits above NavBar) -->
<div class="fixed bottom-24 left-0 w-full px-container-margin z-30">
<div class="bg-surface-container/90 backdrop-blur-md rounded-full p-2 flex items-center gap-3 border border-outline-variant/30">
<button class="p-2 text-secondary hover:bg-surface-variant rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">mic_off</span>
</button>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-body-md font-body text-on-surface placeholder-secondary px-2" placeholder="Bolo..." type="text"/>
<button class="w-[64px] h-[64px] bg-primary rounded-full shadow-md flex items-center justify-center text-on-primary flex-shrink-0 transition-transform active:scale-95 shadow-primary/20">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
</div>
<!-- BottomNavBar -->
<nav class="bg-surface-container/80 backdrop-blur-md fixed bottom-0 w-full z-50 flex justify-around items-center h-20 pb-safe px-4 md:hidden border-t border-outline-variant/30">
<!-- Chat (Active) -->
<button class="flex flex-col items-center justify-center text-primary font-bold transition-all duration-200 active:scale-90 hover:bg-surface-variant p-2 rounded-lg flex-1">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
<span class="font-label text-label-md">Chat</span>
</button>
<!-- Aaj ka Plan (Inactive) -->
<button class="flex flex-col items-center justify-center text-secondary transition-all duration-200 active:scale-90 hover:bg-surface-variant p-2 rounded-lg flex-1">
<span class="material-symbols-outlined mb-1">calendar_today</span>
<span class="font-label text-label-md">Aaj ka Plan</span>
</button>
<!-- Beete Din (Inactive) -->
<button class="flex flex-col items-center justify-center text-secondary transition-all duration-200 active:scale-90 hover:bg-surface-variant p-2 rounded-lg flex-1">
<span class="material-symbols-outlined mb-1">history</span>
<span class="font-label text-label-md">Beete Din</span>
</button>
</nav>
</body></html>
